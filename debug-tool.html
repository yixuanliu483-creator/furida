<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连接诊断工具</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        padding: 20px;
    }
    .wrap { max-width: 500px; margin: 0 auto; }
    .card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { font-size: 1.3rem; margin: 0 0 16px; }
    input {
        width: 100%; padding: 12px; margin-bottom: 12px;
        border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.1); color: white; font-size: 0.95rem;
    }
    button {
        width: 100%; padding: 12px; border: none; border-radius: 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white; font-weight: 600; cursor: pointer; font-size: 1rem;
        margin-bottom: 8px;
    }
    .result {
        margin-top: 16px; padding: 14px; border-radius: 8px;
        background: rgba(0,0,0,0.3); font-family: monospace;
        font-size: 0.8rem; white-space: pre-wrap; word-break: break-all;
        display: none;
    }
    .result.show { display: block; }
    .label { font-size: 0.8rem; opacity: 0.6; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>🔧 连接诊断工具</h1>
        <label class="label">Worker 地址</label>
        <input type="text" id="workerUrl" value="https://furida-ai.yixuanliu483.workers.dev">

        <button onclick="testRoot()">1. 测试根路径（GET /）</button>
        <label class="label" style="margin-top:16px;">测试登录用的密钥（真实值）</label>
        <input type="text" id="testAlpha" placeholder="Alpha 密钥">
        <input type="text" id="testBeta" placeholder="Beta 密钥">
        <button onclick="testLogin()">2. 测试登录接口（POST /auth/login）</button>
        <button onclick="testNoCors()">3. 测试是否单纯是CORS问题（no-cors模式）</button>
        <label class="label" style="margin-top:16px;">用于测试聊天接口的 token（从登录后的localStorage里复制，或留空测试无token情况）</label>
        <input type="text" id="testToken" placeholder="粘贴 token（可选）">
        <button onclick="autoFillToken()" style="background: rgba(255,255,255,0.2);">自动读取当前浏览器已登录的 token</button>
        <button onclick="testChat()">4. 测试聊天接口（POST /chat）</button>
        <button onclick="testTTS()">5. 测试语音合成接口（POST /tts）</button>

        <div class="result" id="result"></div>
    </div>
</div>

<script>
function show(text) {
    const el = document.getElementById('result');
    el.textContent = text;
    el.classList.add('show');
}

async function testRoot() {
    const base = document.getElementById('workerUrl').value.trim();
    show('请求中...');
    try {
        const res = await fetch(base + '/', { method: 'GET' });
        const text = await res.text();
        show(`状态码: ${res.status}\n\n返回内容:\n${text}`);
    } catch (err) {
        show(`【捕获到异常】\n类型: ${err.name}\n信息: ${err.message}\n\n这种错误通常意味着请求根本没有到达服务器（网络层拦截、CORS、地址错误等）`);
    }
}

async function testNoCors() {
    const base = document.getElementById('workerUrl').value.trim();
    show('请求中...');
    try {
        // no-cors 模式：不会返回可读内容，但只要能建立连接就不会报错
        // 如果这个成功了，但上面 1/2 失败，就能确认是 CORS 头的问题，不是网络问题
        const res = await fetch(base + '/', { method: 'GET', mode: 'no-cors' });
        show(`【no-cors 请求成功】\n type: ${res.type}\n\n这说明网络连接本身是通的，服务器也有响应——如果上面"测试1"依然报 Failed to fetch，就可以确认问题是 CORS 响应头配置，不是网络连通性问题。`);
    } catch (err) {
        show(`【no-cors 也失败了】\n类型: ${err.name}\n信息: ${err.message}\n\n这说明真的是网络层面连不上（DNS/连接被拦截/服务器没响应），不是 CORS 问题。`);
    }
}

async function testLogin() {
    const base = document.getElementById('workerUrl').value.trim();
    const identityKeyAlpha = document.getElementById('testAlpha').value.trim();
    const identityKeyBeta = document.getElementById('testBeta').value.trim();
    show('请求中...');
    try {
        const res = await fetch(base + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identityKeyAlpha, identityKeyBeta })
        });
        const text = await res.text();
        show(`状态码: ${res.status}\n\n返回内容（原始文本）:\n${text}\n\n【说明】只要看到状态码和内容，就说明请求成功到达了 Worker，不管密钥对不对，这一步都不该报"连接错误"。`);
    } catch (err) {
        show(`【捕获到异常，这就是"连接错误"的真正原因】\n类型: ${err.name}\n信息: ${err.message}\n\n常见原因：\n- CORS 被浏览器拦截\n- Worker 地址拼写错误\n- Worker 部署失败或抛出未捕获异常\n- 网络问题`);
    }
}

function autoFillToken() {
    const token = localStorage.getItem('token');
    if (token) {
        document.getElementById('testToken').value = token;
        show(`已读取到 token（说明 debug-tool 和 chat.html 在同一个网站/同源，共享 localStorage）：\n${token}`);
    } else {
        show('当前浏览器 localStorage 里没有 token，说明这个页面跟你登录时用的页面不是同一个域名/同一个浏览器，请先在这个浏览器里正常登录一次 login.html 再回来点这个按钮。');
    }
}

async function testTTS() {
    const base = document.getElementById('workerUrl').value.trim();
    const token = document.getElementById('testToken').value.trim();
    show('请求中...');
    try {
        const res = await fetch(base + '/tts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ text: '你好，这是一条语音测试' })
        });
        const data = await res.json();

        if (!res.ok || !data.audio) {
            show(`状态码: ${res.status}\n\n后端返回内容:\n${JSON.stringify(data)}\n\n【说明】后端没有正确返回音频数据，问题出在 /tts 接口本身（比如 MiniMax API Key、voice_id 配错，或者 MiniMax 那边报错）。`);
            return;
        }

        show(`状态码: ${res.status}\n\n后端成功返回音频数据（长度: ${data.audio.length} 字符）\n\n正在尝试播放...`);

        const audio = new Audio(`data:audio/mp3;base64,${data.audio}`);
        audio.onplay = () => show(`状态码: ${res.status}\n\n后端成功返回音频数据（长度: ${data.audio.length} 字符）\n\n✅ 播放已开始！如果这次能听到声音，说明后端完全正常，之前问题在 chat.html 页面的调用逻辑上。`);
        audio.onerror = () => show(`【音频解码失败】\n后端确实返回了数据，但浏览器无法播放这段音频\n可能原因：MiniMax 返回的音频格式/编码有问题，或者 hex→base64 转换出错\n错误详情: ${audio.error ? audio.error.code : '未知'}`);

        try {
            await audio.play();
        } catch (playErr) {
            show(`【浏览器拒绝播放】\n类型: ${playErr.name}\n信息: ${playErr.message}\n\n这很可能是浏览器的"自动播放限制"——现代手机浏览器要求音频播放必须直接由用户点击触发，不能是异步请求完成后才播放。`);
        }
    } catch (err) {
        show(`【捕获到异常】\n类型: ${err.name}\n信息: ${err.message}`);
    }
}
    const base = document.getElementById('workerUrl').value.trim();
    const token = document.getElementById('testToken').value.trim();
    show('请求中...');
    try {
        const res = await fetch(base + '/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ message: '你好，这是一条测试消息' })
        });
        const text = await res.text();
        show(`状态码: ${res.status}\n\n返回内容（原始文本）:\n${text}`);
    } catch (err) {
        show(`【捕获到异常】\n类型: ${err.name}\n信息: ${err.message}`);
    }
}
</script>
</body>
</html>
