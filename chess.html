<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furida - 下棋</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chess-wrap {
            max-width: 480px;
            margin: 20px auto;
            text-align: center;
        }
        #chessBoard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid #3ba8e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .chess-square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7vw;
            max-font-size: 32px;
            cursor: pointer;
            user-select: none;
            aspect-ratio: 1;
            position: relative;
        }
        .chess-square.light { background: #f0f0f0; }
        .chess-square.dark { background: #66ccff; }
        .chess-square.selected { background: #ffd166 !important; }
        .chess-square.legal-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            border-radius: 50%;
            background: rgba(0,0,0,0.25);
        }
        .chess-square.legal-capture {
            box-shadow: inset 0 0 0 4px rgba(220,50,50,0.6);
        }
        #chessStatus {
            margin: 12px 0;
            font-weight: 600;
            color: #333;
        }
        #furidaComment {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 12px;
            text-align: left;
            min-height: 20px;
            display: none;
        }
        #chessControls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #chessControls button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="logo">Furida</div>
        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="chat.html">Chat</a></li>
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
<section class="hero">
    <div class="chess-wrap">
        <h1>下棋吧</h1>
        <p id="chessStatus">轮到你走了（执白）</p>

        <div id="chessBoard"></div>

        <div id="furidaComment"></div>

        <div id="chessControls">
            <button onclick="restartGame()">重新开始</button>
            <button id="voiceToggleBtn" onclick="toggleVoice()">🔇 语音已关闭</button>
        </div>
    </div>
</section>
</main>

<script src="js/chess.js"></script>

</body>
</html>
