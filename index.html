<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipay Anderson - 个人博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 语言抽屉菜单 -->
    <div id="langDrawer" class="lang-drawer">
        <div class="lang-drawer-content">
            <h3>选择语言</h3>
            <button class="lang-btn" onclick="switchLang('zh')" id="btn-zh">中文</button>
            <button class="lang-btn" onclick="switchLang('en')" id="btn-en">English</button>
            <button class="lang-btn" onclick="switchLang('ja')" id="btn-ja">日本語</button>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">Ipay Anderson</div>
            <div class="nav-center">
                <ul class="nav-links">
                    <li><a href="index.html" class="active" id="nav-home">首页</a></li>
                    <li><a href="about.html" id="nav-about">关于</a></li>
                    <li><a href="#furida-project" id="nav-furida">Furida 项目</a></li>
                </ul>
            </div>
            <button class="lang-toggle" onclick="toggleLangDrawer()">
                <span class="hamburger"></span>
                <span class="hamburger"></span>
                <span class="hamburger"></span>
            </button>
        </div>
    </nav>

    <main>
        <!-- 英雄区 -->
        <section class="hero">
            <div class="container">
                <h1 id="hero-title">Ipay Anderson</h1>
                <p id="hero-desc">个人博客 · 分享思考与创作</p>
                <a href="#furida-project" class="btn btn-primary" id="hero-btn">探索</a>
            </div>
        </section>

        <!-- 博客介绍 -->
        <section class="recent-posts">
            <div class="container">
                <h2 id="blog-title">个人博客</h2>
                <p id="blog-desc">简洁、现代的个人空间，记录生活与思考。</p>
            </div>
        </section>
    </main>

    <!-- Furida 项目 -->
    <section id="furida-project" class="furida-section">
        <div class="container">
            <h2 id="furida-title">Furida 项目</h2>
            <p id="furida-text">也许这将成为未来的第二个 Neuro Sama。</p>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Ipay Anderson</p>
        </div>
    </footer>

    <script>
        // 多语言文本
        const translations = {
            zh: {
                navHome: "首页",
                navAbout: "关于",
                navFurida: "Furida 项目",
                heroTitle: "Ipay Anderson",
                heroDesc: "个人博客 · 分享思考与创作",
                heroBtnText: "探索",
                blogTitle: "个人博客",
                blogDesc: "简洁、现代的个人空间，记录生活与思考。",
                furidaTitle: "Furida 项目",
                furidaText: "也许这将成为未来的第二个 Neuro Sama。"
            },
            en: {
                navHome: "Home",
                navAbout: "About",
                navFurida: "Furida Project",
                heroTitle: "Ipay Anderson",
                heroDesc: "Personal Blog · Share Thoughts & Creations",
                heroBtnText: "Explore",
                blogTitle: "Personal Blog",
                blogDesc: "A clean and modern personal space to record life and thoughts.",
                furidaTitle: "Furida Project",
                furidaText: "Maybe this will become the second Neuro Sama in the future."
            },
            ja: {
                navHome: "ホーム",
                navAbout: "について",
                navFurida: "Furida プロジェクト",
                heroTitle: "Ipay Anderson",
                heroDesc: "個人ブログ · 思考と創作を共有",
                heroBtnText: "探索",
                blogTitle: "個人ブログ",
                blogDesc: "生活と思考を記録するシンプルでモダンな個人スペース。",
                furidaTitle: "Furida プロジェクト",
                furidaText: "将来、第二の Neuro Sama になるかもしれません。"
            }
        };

        // 切换语言
        function switchLang(lang) {
            localStorage.setItem('lang', lang);
            const t = translations[lang];
            
            // 更新所有文本
            const elements = {
                'nav-home': t.navHome,
                'nav-about': t.navAbout,
                'nav-furida': t.navFurida,
                'hero-title': t.heroTitle,
                'hero-desc': t.heroDesc,
                'hero-btn': t.heroBtnText,
                'blog-title': t.blogTitle,
                'blog-desc': t.blogDesc,
                'furida-title': t.furidaTitle,
                'furida-text': t.furidaText
            };

            for (const [id, text] of Object.entries(elements)) {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            }
            
            // 更新语言按钮活跃状态
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            // 关闭抽屉
            closeLangDrawer();
        }

        // 切换语言抽屉
        function toggleLangDrawer() {
            const drawer = document.getElementById('langDrawer');
            drawer.classList.toggle('open');
        }

        // 关闭语言抽屉
        function closeLangDrawer() {
            const drawer = document.getElementById('langDrawer');
            drawer.classList.remove('open');
        }

        // 点击外部关闭抽屉
        document.addEventListener('click', function(e) {
            const drawer = document.getElementById('langDrawer');
            const toggle = document.querySelector('.lang-toggle');
            if (drawer && !drawer.contains(e.target) && !toggle.contains(e.target)) {
                closeLangDrawer();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 默认中文
            const lang = localStorage.getItem('lang') || 'zh';
            switchLang(lang);

            // Furida 项目平滑滚动
            document.querySelectorAll('a[href="#furida-project"]').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const section = document.getElementById('furida-project');
                    if (section) {
                        section.scrollIntoView({ behavior: 'smooth' });
                        closeLangDrawer();
                    }
                });
            });

            // 关闭抽屉当用户滚动时
            document.addEventListener('scroll', () => {
                closeLangDrawer();
            });
        });
    </script>
</body>
</html>
