<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipay Anderson - 个人博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Ipay Anderson</div>
            
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页 / Home</a></li>
                <li><a href="about.html">关于 / About</a></li>
                <li><a href="#furida-project">Furida 项目</a></li>
            </ul>
        </div>
    </nav>

    <!-- 语言切换 -->
    <div class="lang-switch">
        <button onclick="switchLang('zh')" id="btn-zh">中文</button>
        <button onclick="switchLang('en')" id="btn-en">EN</button>
        <button onclick="switchLang('ja')" id="btn-ja">日本語</button>
    </div>

    <main>
        <section class="hero">
            <div class="container">
                <h1 id="hero-title">Ipay Anderson</h1>
                <p id="hero-desc">个人博客 · 分享思考与创作</p>
                <div class="hero-buttons">
                    <a href="about.html" class="btn btn-primary">了解更多</a>
                </div>
            </div>
        </section>

        <section class="recent-posts">
            <div class="container">
                <h2 id="blog-title">个人博客</h2>
                <p id="blog-desc">简洁、现代的个人空间，记录生活与思考。</p>
            </div>
        </section>
    </main>

    <!-- Furida 项目（仅在导航中提及，首页彻底移除） -->
    <div id="furida-project" style="display: none;"></div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ipay Anderson. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function switchLang(lang) {
            localStorage.setItem('lang', lang);
            // 可后续扩展完整多语言
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('lang') || 'zh';
            // 未来可添加更多翻译逻辑
        });
    </script>
</body>
</html>
