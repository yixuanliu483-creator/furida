<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Furida - 个人博客">
    <title>Furida - 个人博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">Furida</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="posts.html">文章</a></li>
                <li><a href="chat.html">AI 助手</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main>
        <!-- 英雄区 -->
        <section class="hero">
            <div class="container">
                <h1>欢迎来到 Furida</h1>
                <p>分享想法，记录生活</p>
                <div class="hero-buttons">
                    <a href="posts.html" class="btn btn-primary">阅读文章</a>
                    <a href="chat.html" class="btn btn-secondary">AI 助手</a>
                </div>
            </div>
        </section>

        <!-- 最新文章 -->
        <section class="recent-posts">
            <div class="container">
                <h2>最新文章</h2>
                <div class="posts-grid" id="recentPosts">
                    <!-- 动态加载文章 -->
                </div>
                <div class="view-all">
                    <a href="posts.html" class="btn btn-outline">查看所有文章</a>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Furida. 由 yixuanliu483-creator 创建</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
