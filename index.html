<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="About Ipay Anderson - Furida">
    <title>关于 / About - Furida</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Furida</div>
            
            <div class="lang-switch" style="position:absolute; top:20px; right:30px; display:flex; gap:10px;">
                <button onclick="switchLang('zh')">中文</button>
                <button onclick="switchLang('en')">EN</button>
                <button onclick="switchLang('ja')">日本語</button>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">首页 / Home</a></li>
                <li><a href="#furida-project">Furida 项目</a></li>
                <li><a href="about.html" class="active">关于 / About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <article class="post">
            <div class="container" style="max-width: 800px; margin: 60px auto;">
                <h1 id="about-title">关于 Furida</h1>
                
                <div class="content" id="about-content">
                    <p>Ipay Anderson 的个人博客项目。</p>
                    <p>简洁、现代、支持多语言。</p>
                    
                    <h2 id="project-intro">Furida 项目</h2>
                    <p id="project-desc">也许这未来会是第二个 Neuro Sama。</p>
                </div>
            </div>
        </article>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Furida. By Ipay Anderson</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function switchLang(lang) {
            const texts = {
                zh: { title: "关于 Furida", intro: "Furida 项目", desc: "也许这未来会是第二个 Neuro Sama。" },
                en: { title: "About Furida", intro: "Furida Project", desc: "Maybe this will become the second Neuro Sama in the future." },
                ja: { title: "Furida について", intro: "Furida プロジェクト", desc: "もしかしたらこれは未来の二番目の Neuro Sama になるかもしれません。" }
            };
            const t = texts[lang];
            document.getElementById('about-title').textContent = t.title;
            document.getElementById('project-intro').textContent = t.intro;
            document.getElementById('project-desc').textContent = t.desc;
        }
        document.addEventListener('DOMContentLoaded', () => switchLang('zh'));
    </script>
</body>
</html>
