<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furida - Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="logo">Furida</div>

        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
            <div id="userAvatar" style="
                width:32px; height:32px; border-radius:50%;
                background:#764ba2; color:white;
                display:flex; align-items:center; justify-content:center;
                font-weight:600;
            "></div>
            <span id="username"></span>
            <button onclick="handleLogout()" style="
                padding:6px 12px; border-radius:6px; border:1px solid #ccc;
                background:white; cursor:pointer; font-size:0.85rem;
            ">退出</button>
        </div>
    </div>
</nav>


<main>

<section class="hero">
    <div class="container">

        <h1>Talk with Furida</h1>

        <p>
            A growing digital life.
        </p>


        <div id="chatMessages" style="
            margin-top:30px;
            height:350px;
            overflow-y:auto;
            background:#f5f5f5;
            padding:20px;
            border-radius:12px;
            text-align:left;
        ">
        </div>


        <div style="
            margin-top:20px;
            display:flex;
            gap:10px;
        ">

            <input 
                id="messageInput"
                type="text"
                placeholder="Say something to Furida..."
                style="
                flex:1;
                padding:12px;
                border-radius:8px;
                border:1px solid #ccc;
                "
            >

            <button
                id="micBtn"
                onclick="toggleRecording()"
                style="
                    padding:12px 16px;
                    border-radius:8px;
                    border:1px solid #ccc;
                    background:white;
                    cursor:pointer;
                    font-size:1.1rem;
                "
                title="按一下开始录音，再按一下结束"
            >🎤</button>

            <button 
                id="sendBtn"
                onclick="sendMessage()"
                class="btn btn-primary">
                Send
            </button>

        </div>

        <div style="margin-top:12px; text-align:right;">
            <button
                id="voiceToggleBtn"
                onclick="toggleVoice()"
                style="
                    padding:6px 14px;
                    border-radius:20px;
                    border:1px solid #ccc;
                    background:white;
                    cursor:pointer;
                    font-size:0.85rem;
                "
            >🔇 语音已关闭</button>
        </div>

    </div>
</section>

</main>


<script src="js/chat.js"></script>

</body>
</html>
