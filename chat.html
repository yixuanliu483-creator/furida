<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="与 AI 聊天助手进行有趣的对话">
    <title>AI 聊天 - Furida</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">Furida</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="posts.html">文章</a></li>
                <li><a href="chat.html" class="active">AI 聊天</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main>
        <div class="chat-container">
            <h1 style="text-align: center; margin-bottom: 2rem; color: #0066cc;">🤖 AI 聊天助手</h1>
            
            <div class="chat-box">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input 
                        type="text" 
                        id="chatInput" 
                        placeholder="输入你的消息... (Enter 发送)"
                        autocomplete="off"
                    >
                    <button id="sendButton">发送</button>
                </div>
            </div>
            
            <div style="margin-top: 2rem; padding: 1.5rem; background: #f0f7ff; border-radius: 8px; border-left: 4px solid #0066cc;">
                <h3 style="color: #0066cc; margin-bottom: 0.5rem;">💡 提示</h3>
                <p style="margin: 0; color: #666;">
                    目前使用的是基础回复系统。你可以尝试问我："你好"、"你是谁"、"帮助" 等问题。
                </p>
                <p style="margin: 0.5rem 0 0; color: #999; font-size: 0.9rem;">
                    未来将集成更强大的 AI 模型，实现更智能的对话！🚀
                </p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Furida. 由 yixuanliu483-creator 创建</p>
            <p>使用 Python + HTML5 + CSS3 构建 | 托管在 GitHub Pages</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
